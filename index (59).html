<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBW Duty — Preference Submission</title>
<style>
  :root {
    --bg: #0e1410;
    --panel: #161d18;
    --panel-2: #1c2420;
    --border: #2a342d;
    --text: #e8ece8;
    --text-dim: #8a9389;
    --accent: #6b8e4e;
    --accent-bright: #8fb86b;
    --amber: #c9a227;
    --red: #b3492f;
    --blue: #4a7a9e;
    --mono: 'Courier New', Courier, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(107,142,78,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(74,122,158,0.05), transparent 40%);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  /* Header */
  .header {
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    background: var(--panel);
    padding: 18px 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 100%;
    background: repeating-linear-gradient(135deg, transparent, transparent 8px, rgba(107,142,78,0.06) 8px, rgba(107,142,78,0.06) 9px);
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent-bright);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Section panel */
  .panel {
    border: 1px solid var(--border);
    background: var(--panel);
    margin-bottom: 16px;
  }
  .panel-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body { padding: 16px; }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-family: var(--mono);
    letter-spacing: 0.5px;
  }

  select, input[type="date"] {
    width: 100%;
    padding: 11px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    border-radius: 2px;
    font-family: inherit;
  }
  select:focus, input:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Status pill selector */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .status-btn {
    padding: 10px 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--mono);
    text-align: center;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.12s;
    letter-spacing: 0.5px;
  }
  .status-btn.active.preferred { background: rgba(107,142,78,0.18); border-color: var(--accent); color: var(--accent-bright); }
  .status-btn.active.unavailable { background: rgba(179,73,47,0.18); border-color: var(--red); color: #d97a5e; }

  .reason-row { margin-top: 12px; display: none; }
  .reason-row.show { display: block; }
  .reason-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .reason-btn {
    padding: 9px 6px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    font-size: 11px;
    text-align: center;
    cursor: pointer;
    border-radius: 2px;
    color: var(--text-dim);
    font-family: var(--mono);
  }
  .reason-btn.active[data-reason="Medical"] { background: rgba(179,73,47,0.2); border-color: var(--red); color: #d97a5e; }
  .reason-btn.active[data-reason="Leave"] { background: rgba(201,162,39,0.2); border-color: var(--amber); color: #ddb84a; }
  .reason-btn.active[data-reason="Training"] { background: rgba(74,122,158,0.2); border-color: var(--blue); color: #6fa3c9; }
  .reason-btn.active[data-reason="Course"] { background: rgba(107,142,78,0.2); border-color: var(--accent); color: var(--accent-bright); }

  .add-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: var(--panel-2);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent-bright); }

  /* Queued entries list */
  .entry-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    font-size: 13px;
    border-radius: 2px;
  }
  .entry.unavailable { border-left-color: var(--red); }
  .entry-info { display: flex; flex-direction: column; gap: 2px; }
  .entry-date { font-family: var(--mono); font-weight: 600; }
  .entry-meta { font-size: 11px; color: var(--text-dim); }
  .entry-remove {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; padding: 4px 8px;
  }
  .entry-remove:hover { color: var(--red); }
  .empty-state {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--mono);
    padding: 24px 0;
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #0e1410;
    border: none;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    font-family: var(--mono);
  }
  .submit-btn:hover { background: var(--accent-bright); }
  .submit-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

  .status-msg {
    text-align: center;
    font-size: 12px;
    font-family: var(--mono);
    margin-top: 10px;
    padding: 10px;
    border-radius: 2px;
    display: none;
  }
  .status-msg.show { display: block; }
  .status-msg.success { background: rgba(107,142,78,0.12); color: var(--accent-bright); border: 1px solid var(--accent); }
  .status-msg.error { background: rgba(179,73,47,0.12); color: #d97a5e; border: 1px solid var(--red); }

  .points-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    background: rgba(201,162,39,0.12);
    border: 1px solid var(--amber);
    padding: 3px 8px;
    border-radius: 2px;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="eyebrow">SBW &middot; Regimental Duty Roster</div>
    <div class="title">Duty Preference Submission</div>
    <div class="subtitle">Mark your preferred and unavailable dates for next month's duty cycle.</div>
  </div>

  <!-- Identity -->
  <div class="panel">
    <div class="panel-head">
      <span>01 / Identify Yourself</span>
      <span id="pointsBadgeWrap"></span>
    </div>
    <div class="panel-body">
      <label for="memberSelect">Select your name</label>
      <select id="memberSelect">
        <option value="">— Loading members —</option>
      </select>
    </div>
  </div>

  <!-- Date entry -->
  <div class="panel">
    <div class="panel-head"><span>02 / Add a Date</span></div>
    <div class="panel-body">
      <label for="dateInput">Date</label>
      <input type="date" id="dateInput">

      <label style="margin-top:12px;">Status</label>
      <div class="status-grid">
        <div class="status-btn preferred" data-status="Preferred">Preferred</div>
        <div class="status-btn unavailable" data-status="Unavailable">Unavailable</div>
      </div>

      <div class="reason-row" id="reasonRow">
        <label style="margin-top:0;">Reason</label>
        <div class="reason-grid">
          <div class="reason-btn" data-reason="Medical">Medical</div>
          <div class="reason-btn" data-reason="Leave">Leave</div>
          <div class="reason-btn" data-reason="Training">Training</div>
          <div class="reason-btn" data-reason="Course">Course</div>
        </div>
      </div>

      <button class="add-btn" id="addBtn">+ Add to submission</button>
    </div>
  </div>

  <!-- Queued list -->
  <div class="panel">
    <div class="panel-head"><span>03 / Review Submission</span></div>
    <div class="panel-body">
      <div class="entry-list" id="entryList">
        <div class="empty-state">No dates added yet</div>
      </div>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn">Submit to admin</button>
  <div class="status-msg" id="statusMsg"></div>

</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwEEeab7N7jEF2Gf4FhQMkNgpbW6ZnFACa5-r1M9rA4i2vBFQRfDFIE2Yvd1sJMj4crxg/exec";

  let members = [];
  let entries = [];
  let selectedStatus = null;
  let selectedReason = null;

  const memberSelect = document.getElementById('memberSelect');
  const dateInput = document.getElementById('dateInput');
  const reasonRow = document.getElementById('reasonRow');
  const entryList = document.getElementById('entryList');
  const addBtn = document.getElementById('addBtn');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  const pointsBadgeWrap = document.getElementById('pointsBadgeWrap');

  // Set min date to tomorrow
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  dateInput.min = tomorrow.toISOString().split('T')[0];

  // Load members
  fetch(API_URL + "?action=getMembers")
    .then(r => r.json())
    .then(data => {
      members = data;
      memberSelect.innerHTML = '<option value="">— Select your name —</option>' +
        members.map(m => `<option value="${m.name}">${m.rank} ${m.name}</option>`).join('');
    })
    .catch(() => {
      memberSelect.innerHTML = '<option value="">Failed to load — refresh page</option>';
    });

  memberSelect.addEventListener('change', () => {
    const m = members.find(x => x.name === memberSelect.value);
    if (m) {
      pointsBadgeWrap.innerHTML = `<span class="points-badge">${m.points} PTS</span>`;
    } else {
      pointsBadgeWrap.innerHTML = '';
    }
  });

  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedStatus = btn.dataset.status;
      reasonRow.classList.toggle('show', selectedStatus === 'Unavailable');
      if (selectedStatus === 'Preferred') selectedReason = null;
    });
  });

  document.querySelectorAll('.reason-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedReason = btn.dataset.reason;
    });
  });

  function renderEntries() {
    if (entries.length === 0) {
      entryList.innerHTML = '<div class="empty-state">No dates added yet</div>';
      return;
    }
    entryList.innerHTML = entries.map((e, i) => `
      <div class="entry ${e.status === 'Unavailable' ? 'unavailable' : ''}">
        <div class="entry-info">
          <div class="entry-date">${e.date}</div>
          <div class="entry-meta">${e.status}${e.reason ? ' — ' + e.reason : ''}</div>
        </div>
        <button class="entry-remove" data-index="${i}">&times;</button>
      </div>
    `).join('');

    document.querySelectorAll('.entry-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        entries.splice(Number(btn.dataset.index), 1);
        renderEntries();
      });
    });
  }

  addBtn.addEventListener('click', () => {
    if (!dateInput.value) { showStatus('error', 'Pick a date first.'); return; }
    if (!selectedStatus) { showStatus('error', 'Choose Preferred or Unavailable.'); return; }
    if (selectedStatus === 'Unavailable' && !selectedReason) { showStatus('error', 'Choose a reason.'); return; }

    entries.push({
      date: dateInput.value,
      status: selectedStatus,
      reason: selectedStatus === 'Unavailable' ? selectedReason : ''
    });
    renderEntries();

    // reset mini-form
    dateInput.value = '';
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('active'));
    selectedStatus = null;
    selectedReason = null;
    reasonRow.classList.remove('show');
  });

  function showStatus(type, msg) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg show ' + type;
    setTimeout(() => statusMsg.classList.remove('show'), 3500);
  }

  submitBtn.addEventListener('click', () => {
    if (!memberSelect.value) { showStatus('error', 'Select your name first.'); return; }
    if (entries.length === 0) { showStatus('error', 'Add at least one date.'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    const payload = {
      action: 'submitPreference',
      entries: entries.map(e => ({ ...e, name: memberSelect.value }))
    };

    fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          showStatus('success', `Submitted ${res.count} date(s). Thank you.`);
          entries = [];
          renderEntries();
        } else {
          showStatus('error', 'Something went wrong. Try again.');
        }
      })
      .catch(() => showStatus('error', 'Network error. Check connection.'))
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit to admin';
      });
  });
</script>

</body>
</html>
